services:
  - type: web
    name: maliciousbot
    env: python
    plan: free
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn MaliciousBot.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: diploma-project-rwht.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://diploma-project-rwht.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: dpg-d7b5tkedqaus73c9pdrg-a
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
