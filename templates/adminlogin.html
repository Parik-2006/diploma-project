{% extends "nav.html" %}
{% block content %}
{% load static %}


<div class="body_bg layout_padding">
 <!-- contact section -->

 <section class="contact_section">
    <div class="container">
      <div class="heading_container">
        <h2>
          Admin
        </h2>
      </div>
    </div>
    <div class="container contact_bg layout_padding2-top">
      <div class="row">
        <div class="col-md-6">
          <div class="contact_form ">
            <form method="post">
              {% csrf_token %}
              <input type="text" placeholder="User Name" name="uname">
              <input type="password" placeholder="Password" name="psw">
               <button type="submit">
                Login
              </button>
            </form>
          </div>
        </div>
        <div class="col-md-6">
          <div class="img-box">
            <img src="{% static 'images/contact-img.jpg' %}" alt="">
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- end contact section -->

</div>



{% endblock %}
